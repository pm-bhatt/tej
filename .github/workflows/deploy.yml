name: Build and Deploy Tej Web

on:
  push:
    branches: [ main, master ]
    paths:
      - 'crates/tej-core/**'
      - 'apps/tej-web/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        rustup target add wasm32-unknown-unknown
      shell: bash
    
    - name: Install wasm-pack
      run: cargo install wasm-pack
    
    - name: Build WASM
      run: |
        cd crates/tej-core
        cp Cargo-wasm.toml Cargo.toml
        cp src/lib-wasm.rs src/lib.rs
        wasm-pack build --target web --out-dir ../../apps/tej-web/pkg
        cd ../..
        cp crates/tej-core/Cargo-native.toml crates/tej-core/Cargo.toml
        cp crates/tej-core/src/lib-native.rs crates/tej-core/src/lib.rs
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tej-web-build
        path: apps/tej-web/
        retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
    - uses: actions/checkout@v4
    
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: tej-web-build
        path: apps/tej-web/
    
    - name: Deploy to Netlify
      uses: nwtgck/actions-netlify@v3.0
      with:
        publish-dir: './apps/tej-web'
        production-branch: main
        github-token: ${{ secrets.GITHUB_TOKEN }}
        deploy-message: "Deploy from GitHub Actions"
        enable-pull-request-comment: false
        enable-commit-comment: true
        overwrites-pull-request-comment: true
      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      timeout-minutes: 1
