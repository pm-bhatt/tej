[package]
name = "tej-core"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Core speed test measurement library for Tej"
keywords = ["speedtest", "network", "bandwidth", "latency"]
categories = ["network-programming", "command-line-utilities"]

[lib]
name = "tej_core"
crate-type = ["cdylib", "rlib"]

[dependencies]
tokio = { workspace = true, optional = true }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = ["console", "Window", "Performance", "Request", "RequestInit", "RequestMode", "Response", "Headers"] }
serde-wasm-bindgen = "0.6"
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true }
rand = { workspace = true }
reqwest = { version = "0.12", default-features = false, features = ["json"] }
getrandom = { version = "0.2", features = ["js"] }
futures = "0.3"
bytes = "1"
wasm-streams = "0.4"

[features]
default = ["tokio"]
wasm = []

[target.'cfg(target_arch = "wasm32")'.dependencies]
reqwest = { version = "0.12", default-features = false, features = ["json"] }
