[package]
name = "tej-core"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Core speed test measurement library for Tej"
keywords = ["speedtest", "network", "bandwidth", "latency"]
categories = ["network-programming", "command-line-utilities"]

[lib]
name = "tej_core"
crate-type = ["cdylib", "rlib"]

# Dependencies for native targets (not WASM)
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true }
rand = { workspace = true }
reqwest = { version = "0.12", features = ["stream"] }
futures = "0.3"
bytes = "1"

# Dependencies for WASM target
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
wasm-bindgen-test = "0.3"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "console", "Window", "Performance", 
    "Request", "RequestInit", "RequestMode", "Response", "Headers",
    "ReadableStream", "ReadableStreamDefaultReader",
    "AbortController", "AbortSignal"
]}
serde-wasm-bindgen = "0.6"
serde = { workspace = true }
serde_json = { workspace = true }
getrandom = { version = "0.2", features = ["js"] }
rand = { workspace = true }
